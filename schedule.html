<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Appointment - AutoCare Workshop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🔧 AutoCare Workshop</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/schedule">Schedule Appointment</a></li>
                <li><a href="/appointments">View Appointments</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2>Schedule Your Appointment</h2>
            <form method="POST" id="appointmentForm">
                <div class="form-section">
                    <h3>Personal Information</h3>
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="customer_name" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="customer_email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" name="customer_phone" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Appointment Details</h3>
                    <div class="form-group">
                        <label>Preferred Date *</label>
                        <input type="date" name="appointment_date" id="appointment_date" required>
                    </div>
                    <div class="form-group">
                        <label>Preferred Time *</label>
                        <select name="appointment_time" id="appointment_time" required>
                            <option value="">Select time</option>
                            <option value="09:00">9:00 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="14:00">2:00 PM</option>
                            <option value="15:00">3:00 PM</option>
                            <option value="16:00">4:00 PM</option>
                            <option value="17:00">5:00 PM</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Car Details</h3>
                    <div class="form-group">
                        <label>Car Make (Brand) *</label>
                        <input type="text" name="car_make" placeholder="e.g., Toyota, Honda, Ford" required>
                    </div>
                    <div class="form-group">
                        <label>Car Model *</label>
                        <input type="text" name="car_model" placeholder="e.g., Camry, Civic, F-150" required>
                    </div>
                    <div class="form-group">
                        <label>Year *</label>
                        <input type="number" name="car_year" min="1990" max="2025" required>
                    </div>
                    <div class="form-group">
                        <label>License Plate *</label>
                        <input type="text" name="car_license" placeholder="e.g., CE 123 AB" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Service Information</h3>
                    <div class="form-group">
                        <label>Service Type *</label>
                        <select name="service_type" required>
                            <option value="">Select service</option>
                            <option value="diagnostics">Diagnostics</option>
                            <option value="engine_repair">Engine Repair</option>
                            <option value="brake_service">Brake Service</option>
                            <option value="oil_change">Oil Change</option>
                            <option value="ac_service">AC Service</option>
                            <option value="transmission">Transmission Repair</option>
                            <option value="tire_rotation">Tire Rotation</option>
                            <option value="general_maintenance">General Maintenance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Describe any issues (optional)</label>
                        <textarea name="car_issues" rows="4" placeholder="What problems are you experiencing with your car?"></textarea>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Schedule Appointment</button>
            </form>
        </div>
    </div>

    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('appointment_date').min = today;
        
        // Availability check
        const dateInput = document.getElementById('appointment_date');
        const timeSelect = document.getElementById('appointment_time');
        
        async function checkAvailability() {
            const date = dateInput.value;
            const time = timeSelect.value;
            
            if (date && time) {
                const response = await fetch(`/api/check-availability?date=${date}&time=${time}`);
                const data = await response.json();
                
                if (!data.available) {
                    alert('This time slot is already booked. Please select another time.');
                    timeSelect.value = '';
                }
            }
        }
        
        dateInput.addEventListener('change', checkAvailability);
        timeSelect.addEventListener('change', checkAvailability);
    </script>
</body>
</html>
